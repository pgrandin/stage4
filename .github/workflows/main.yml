name: Docker Image CI

on:
  push:
    branches: [ docker ]
  pull_request:
    branches: [ docker ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Generate today's tag
      run: echo "stage4_tag=$(date +%Y%m%d)" >> $GITHUB_ENV   
    - uses: actions/checkout@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2    
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}      
    - name: Build and push stage3 step
      uses: docker/build-push-action@v3
      with:
        push: true
        file: Dockerfile
        target: stage3
        build-args: |
          today=${{ env.stage4_tag }}
        tags: |
          docker.io/pgrandin/stage4-ci:stage3-${{ env.stage4_tag }}
        cache-from: type=registry,ref=user/app:buildcache
        cache-to: type=registry,ref=user/app:buildcache,mode=max          

    - name: Build and push kernel-build step
      uses: docker/build-push-action@v3
      with:
        push: true
        file: Dockerfile
        target: kernel-build
        build-args: |
          today=${{ env.stage4_tag }}
        tags: |
          docker.io/pgrandin/stage4-ci:kernel-build-${{ env.stage4_tag }}
        cache-from: type=registry,ref=user/app:buildcache
        cache-to: type=registry,ref=user/app:buildcache,mode=max          

