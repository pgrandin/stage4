# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "master","gh-actions" ]
  pull_request:
    branches: [ "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  kernel:
    runs-on: ubuntu-latest
    container:
      image: pgrandin/stage4-ci:latest
    strategy:
      matrix:
        target: [Z390]
        
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3

      # Prepare the correct config
      - name: Prepare the correct config
        run: rsync -vrtza files/${{ matrix.target }}/ /

      - name: Prepare kernel config
        run: |
          set -x
          git clone https://github.com/pgrandin/kernel-configs.git /tmp/kernel-configs-master/
          pushd /tmp/kernel-configs-master/
          kconfig_sha=$(git rev-parse HEAD)
          popd

          kversion=$(eix gentoo-source|awk -F'[()]' '/ [~]?5.10/ {version=$2} END{print version}')
          echo "# Prepared for ${kversion}-${kconfig_sha}" > kernel-config.txt

          echo "kversion=$kversion" >> $GITHUB_ENV

          cat /tmp/kernel-configs-master/common_defconfig /tmp/kernel-configs-master/${{ matrix.target }}_defconfig >> kernel-config.txt

          confs=$(cat $GITHUB_WORKSPACE/config.json | jq --arg HOST target -r '.configs[] | select (.["host"]=="${{ matrix.target }}") | .kernel_configs |.[]' )
          for conf in $confs; do
              cat /tmp/kernel-configs-master/${conf}_defconfig >> kernel-config.txt
          done  

      - name: Archive kernel config
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.target }}-kernel-${{ env.kversion }}.config
          path: kernel-config.txt

      - name: check if we have a kernel artifact
        run: |
          set -x
          # Download the kernel artifact
          curl -s -o /tmp/kernel-${{ env.kversion }}.tgz \
            https://${{ secrets.AWS_BUCKET }}.s3-us-west-2.amazonaws.com/stage4/${{ matrix.target }}/kernel-${{ env.kversion }}.tgz
          # Unpack the kernel artifact
          if (file /tmp/kernel-${{ env.kversion }}.tgz | grep -q compressed ) ; then          
            tar -xvzf /tmp/kernel-${{ env.kversion }}.tgz -C / 
          fi

      - name: Build kernel
        run: |
          set -x
          kpath="linux-${{ env.kversion }}-gentoo"

          if [[ -e "/usr/src/${kpath}/arch/x86_64/boot/bzImage" ]]; then
            echo "Found kernel from cache, skipping compilation"
          else
            [ -d /etc/portage/package.keywords/ ] || mkdir /etc/portage/package.keywords/
            echo "=sys-kernel/gentoo-sources-${{ env.kversion }} ~amd64" > /etc/portage/package.keywords/gentoo-sources
            MAKEOPTS="-j$(nproc)" FEATURES="-getbinpkg" emerge -q =gentoo-sources-${{ env.kversion }}
            kpath=$(ls /usr/src/)

            cat kernel-config.txt /usr/src/${kpath}/arch/x86/configs/x86_64_defconfig > /usr/src/${kpath}/arch/x86/configs/${{ matrix.target }}_defconfig
            cd /usr/src/${kpath}

            make defconfig ${{ matrix.target }}_defconfig
            make -j$(nproc)
            cd /usr/src/${kpath}
            make modules_install
            cp arch/x86_64/boot/bzImage /boot/kernel-${{ env.kversion }}-gentoo
            tar cvfz /tmp/kernel-${{ env.kversion }}.tgz \
              /boot/kernel-${{ env.kversion }}-gentoo \
              /lib/modules/ \
              /usr/src/${kpath}/.config \
              /usr/src/${kpath}/arch/x86_64/boot/bzImage
          fi

      - name: "Check kernel archive existence for safekeeping"
        id: check_kernel_archive
        uses: andstor/file-existence-action@v1
        with:
          files: "/tmp/kernel-${{ env.kversion }}.tgz"

      - name: Archive kernel
        if: steps.check_kernel_archive.outputs.files_exists == 'true'
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.target }}-${{ env.kversion }}-kernel.tgz
          path: /tmp/kernel-${{ env.kversion }}.tgz

      - uses: hkusu/s3-upload-action@v2
        if: steps.check_kernel_archive.outputs.files_exists == 'true'
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-bucket: ${{ secrets.AWS_BUCKET }}
          aws-region: "us-west-2"
          destination-dir: /${{ matrix.target }}/
          bucket-root: "/"
          file-path: '/tmp/kernel-${{ env.kversion }}.tgz'

  system:
    runs-on: ubuntu-latest
    container:
      image: pgrandin/stage4-ci:latest
    strategy:
      matrix:
        target: [Z390]        
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
      # Prepare the correct config
      - name: Prepare the correct config
        run: rsync -vrtza files/${{ matrix.target }}/ /     

      - name: eix-sync
        run: emerge-webrsync && eix-update

      - name: harfbuzz/freetype mess
        run: |
          USE="-harfbuzz -png -apng" emerge -1 media-libs/freetype media-libs/harfbuzz --nodeps
          emerge -1 media-libs/freetype media-libs/harfbuzz  
      - name: build @system
        run: emerge -NDuq @system      