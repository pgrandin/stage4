name: 2. Build System
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        required: true
        type: choice
        options:
          - XPS-9730
          - R710
          - R630
          - Z390
  workflow_run:
    workflows: ["1. Prepare Build Environment"]
    types:
      - completed

jobs:
  build:
    runs-on: [self-hosted]
    strategy:
      matrix: ${{ github.event_name == 'workflow_dispatch' && format('{"target":["%s"]}', github.event.inputs.target) || format('{"target":["%s"]}', github.event.workflow_run.head_branch) }}
      fail-fast: false
    env:
      target: ${{ matrix.target }}
      stage4_fs: "./stage4"
    steps:
      - uses: actions/checkout@v3
      
      - name: Download preparation artifact
        uses: actions/download-artifact@v3
        with:
          name: prep-${{ matrix.target }}

      - name: Setup chroot
        run: |
          mount -t proc /proc ${{ env.stage4_fs }}/proc
          mount --rbind /dev ${{ env.stage4_fs }}/dev
          mount -t devpts devpts ${{ env.stage4_fs }}/dev/pts
          mount -t tmpfs tmpfs ${{ env.stage4_fs }}/dev/shm
          mount -t tmpfs tmpfs ${{ env.stage4_fs }}/var/tmp
          mount -t tmpfs tmpfs ${{ env.stage4_fs }}/var/cache

      - name: Sync packages
        env:
          AWS_BUCKET: pierre-packages
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync --delete s3://${AWS_BUCKET}/stage4/${target}/binpkgs/ /dl/binpkgs/${{ env.target }}/
          mkdir -p ${{ env.stage4_fs }}/var/cache/binpkgs
          mount -o bind /dl/binpkgs/${{ env.target }}/ ${{ env.stage4_fs }}/var/cache/binpkgs

      - name: Build process
        run: |
          for script in {00,01_kernel,02_quirks,03_rebuild_world}.sh; do
            cp "chroot/${script}" "${{ env.stage4_fs }}/${script}"
            chroot ${{ env.stage4_fs }} /bin/bash "/${script}" ${{ env.target }}
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-${{ matrix.target }}
          path: ${{ env.stage4_fs }}
          retention-days: 1

      - name: Push package changes
        if: always()
        env:
          AWS_BUCKET: pierre-packages
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync --delete /dl/binpkgs/${{ env.target }}/ s3://${AWS_BUCKET}/stage4/${target}/binpkgs/

